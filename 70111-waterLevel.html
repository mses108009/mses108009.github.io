<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APCS o711 裝飲料：互動解題模擬器</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #007bff; text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .input-group { background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .input-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #218838; }
        #result-area { margin-top: 20px; display: none; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .log-table th, .log-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .log-table th { background-color: #007bff; color: white; }
        .highlight { font-size: 24px; color: #dc3545; font-weight: bold; text-align: center; margin: 20px 0; }
        .cup-info { font-size: 0.9em; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>o711 裝飲料：互動模擬器</h1>
    
    <div class="input-group">
        <h3>1. 設定杯子規格 (w₁, w₂, h₁, h₂)</h3>
        <p class="cup-info">下層底面積為 w₁*w₁，高為 h₁；上層底面積為 w₂*w₂，高為 h₂ [1]。</p>
        <div class="input-row">
            <div><label>w₁ (下層寬):</label><input type="number" id="w1" value="5" min="1" max="50"></div>
            <div><label>w₂ (上層寬):</label><input type="number" id="w2" value="3" min="1" max="50"></div>
            <div><label>h₁ (下層高):</label><input type="number" id="h1" value="10" min="1" max="50"></div>
            <div><label>h₂ (上層高):</label><input type="number" id="h2" value="10" min="1" max="50"></div>
        </div>
        
        <h3>2. 設定倒水次數與體積</h3>
        <div class="input-row">
            <div><label>倒水次數 (n):</label><input type="number" id="n_count" value="3" min="1" max="10"></div>
            <div><label>每次體積 (用逗號隔開):</label><input type="text" id="volumes" value="100, 200, 50"></div>
        </div>
        <button onclick="calculate()">開始模擬並計算最大上升高度</button>
    </div>

    <div id="result-area">
        <div class="highlight" id="max-rise-display"></div>
        <h3>水位變化明細</h3>
        <table class="log-table" id="log-table">
            <thead>
                <tr>
                    <th>次數</th>
                    <th>倒入體積</th>
                    <th>當前總體積</th>
                    <th>目前水位高度</th>
                    <th>本次上升變化量</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>
</div>

<script>
function calculate() {
    // 1. 讀取輸入值
    const w1 = parseInt(document.getElementById('w1').value);
    const w2 = parseInt(document.getElementById('w2').value);
    const h1 = parseInt(document.getElementById('h1').value);
    const h2 = parseInt(document.getElementById('h2').value);
    const n = parseInt(document.getElementById('n_count').value);
    const volStr = document.getElementById('volumes').value;
    const volArray = volStr.split(',').map(v => parseInt(v.trim())).slice(0, n);

    // 2. 基本容積計算 [1]
    const area1 = w1 * w1;
    const area2 = w2 * w2;
    const maxV1 = area1 * h1;
    const maxTotalV = maxV1 + (area2 * h2);

    let currentV = 0;
    let currentH = 0;
    let maxRise = 0;
    let tableHtml = '';

    // 3. 模擬裝水過程 [1, 2]
    for (let i = 0; i < volArray.length; i++) {
        let v = volArray[i] || 0;
        currentV += v;
        
        // 當水杯滿時水位不再上升 [1]
        if (currentV > maxTotalV) currentV = maxTotalV;

        let newH;
        if (currentV <= maxV1) {
            newH = Math.floor(currentV / area1); // 題目保證上升為整數 [1]
        } else {
            newH = h1 + Math.floor((currentV - maxV1) / area2);
        }

        let rise = newH - currentH;
        if (rise > maxRise) maxRise = rise;

        tableHtml += `<tr>
            <td>${i + 1}</td>
            <td>${v}</td>
            <td>${currentV}</td>
            <td>${newH} cm</td>
            <td><strong>${rise} cm</strong></td>
        </tr>`;

        currentH = newH;
    }

    // 4. 顯示結果 [2]
    document.getElementById('max-rise-display').innerText = `最大水位上升變化量：${maxRise} cm`;
    document.getElementById('log-body').innerHTML = tableHtml;
    document.getElementById('result-area').style.display = 'block';
}
</script>

</body>
</html>
